version: '3.8'

services:
  # PostgreSQL 15 資料庫
  postgres:
    image: postgres:15-alpine
    container_name: tpml-postgres
    environment:
      POSTGRES_DB: tpml_seat_tracker
      POSTGRES_USER: tpml_user
      POSTGRES_PASSWORD: dev_password
      POSTGRES_HOST_AUTH_METHOD: scram-sha-256
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tpml_user -d tpml_seat_tracker"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - tpml-network

  # Backend API (FastAPI)
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: tpml-backend
    environment:
      DATABASE_URL: postgresql://tpml_user:dev_password@postgres:5432/tpml_seat_tracker
      LOG_LEVEL: INFO
      ENABLE_SCHEDULER: "true"
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - /app/.venv  # 避免本機 venv 與容器衝突
    depends_on:
      postgres:
        condition: service_healthy
    command: uvicorn src.main:app --host 0.0.0.0 --port 8000 --reload
    networks:
      - tpml-network

  # Frontend (React + Vite)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: development
    container_name: tpml-frontend
    environment:
      VITE_API_BASE_URL: http://localhost:8000/api/v1
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules  # 避免本機 node_modules 與容器衝突
    depends_on:
      - backend
    command: npm run dev -- --host 0.0.0.0
    networks:
      - tpml-network

volumes:
  postgres_data:
    driver: local

networks:
  tpml-network:
    driver: bridge
