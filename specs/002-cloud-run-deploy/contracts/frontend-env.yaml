# 前端 Cloud Run 環境變數契約規格
#
# 本檔案定義前端建置與部署所需的環境變數
# 注意：前端環境變數在建置時（npm run build）注入，不是執行時
#
# 版本: 1.0
# 最後更新: 2025-11-07

---
# 建置時環境變數（Build-time Variables）
build_time_variables:
  VITE_API_BASE_URL:
    type: string
    format: url
    example: "https://tpml-backend-xxx.run.app"
    description: "後端 API 的公開 URL（需先部署後端取得）"
    source: "Dockerfile ARG → ENV"
    injected_at: "建置時（npm run build）"
    visibility: "公開（編譯進 JavaScript bundle，任何人可檢視）"
    required: true

  VITE_MAPBOX_TOKEN:
    type: string
    pattern: "^pk\\."
    example: "pk.eyJ1IjoiZXhhbXBsZSIsImEiOiJjazEyMzQ1Njc4OTAifQ.AbCdEfGhIjKlMnOpQrStUv"
    description: "Mapbox 公開 token（需有 URL referer 限制）"
    source: "Secret Manager → Dockerfile ARG → ENV"
    injected_at: "建置時（npm run build）"
    visibility: "公開（編譯進 JavaScript bundle）"
    required: true
    security_notes:
      - "必須使用 Mapbox 的 PUBLIC token（pk. 開頭）"
      - "在 Mapbox 網站設定 URL referer 限制（例如 *.run.app）"
      - "絕不使用 SECRET token（sk. 開頭）"

# 執行時環境變數（Runtime Variables）
runtime_variables:
  PORT:
    type: integer
    default: 80
    example: 80
    description: "Nginx 監聽 port"
    source: "Cloud Run 自動設定（通常不需手動設定）"
    required: false

# Dockerfile ARG 注入範例
dockerfile_example: |
  FROM node:20-alpine AS builder
  WORKDIR /app

  # 接收建置參數
  ARG VITE_API_BASE_URL
  ARG VITE_MAPBOX_TOKEN

  # 設定為環境變數供 Vite 使用
  ENV VITE_API_BASE_URL=$VITE_API_BASE_URL
  ENV VITE_MAPBOX_TOKEN=$VITE_MAPBOX_TOKEN
  ENV NODE_ENV=production

  COPY package.json package-lock.json* ./
  RUN npm ci
  COPY . .
  RUN npm run build  # Vite 在此時讀取 VITE_* 環境變數

  FROM nginx:1.27-alpine
  COPY docker/nginx.conf /etc/nginx/conf.d/default.conf
  COPY --from=builder /app/dist /usr/share/nginx/html
  EXPOSE 80
  CMD ["nginx", "-g", "daemon off;"]

# 部署範例指令
deployment_example: |
  # 方法 1: 使用 Cloud Run MCP 工具（推薦）
  # 注意：需確認 MCP 工具支援傳遞 build args
  # 詳見 quickstart.md

  # 方法 2: 使用 Cloud Build + gcloud（手動）
  # 步驟 1: 建置映像檔並注入 build args
  gcloud builds submit \
    --config=cloudbuild.yaml \
    --substitutions=_API_URL="https://tpml-backend-xxx.run.app",_MAPBOX_TOKEN="$(gcloud secrets versions access latest --secret=mapbox-token)"

  # 步驟 2: 部署到 Cloud Run
  gcloud run deploy tpml-frontend \
    --region=asia-east1 \
    --image=asia-east1-docker.pkg.dev/PROJECT_ID/containers/frontend:latest \
    --cpu=0.5 \
    --memory=512Mi \
    --min-instances=0 \
    --max-instances=5 \
    --concurrency=80 \
    --timeout=60 \
    --port=80 \
    --allow-unauthenticated

# Cloud Build 配置範例
cloudbuild_example: |
  # cloudbuild.yaml（範例）
  steps:
    - name: 'gcr.io/cloud-builders/docker'
      args:
        - 'build'
        - '--build-arg'
        - 'VITE_API_BASE_URL=${_API_URL}'
        - '--build-arg'
        - 'VITE_MAPBOX_TOKEN=${_MAPBOX_TOKEN}'
        - '-t'
        - 'asia-east1-docker.pkg.dev/$PROJECT_ID/containers/frontend:latest'
        - '-f'
        - 'frontend/Dockerfile'
        - 'frontend/'
    - name: 'gcr.io/cloud-builders/docker'
      args: ['push', 'asia-east1-docker.pkg.dev/$PROJECT_ID/containers/frontend:latest']
  substitutions:
    _API_URL: 'https://tpml-backend-xxx.run.app'
    _MAPBOX_TOKEN: 'pk.eyJ...'

# 安全性檢查清單
security_checklist:
  - name: "使用 Mapbox Public Token"
    check: "VITE_MAPBOX_TOKEN 以 'pk.' 開頭（非 'sk.'）"
  - name: "Mapbox Token 設定 URL 限制"
    check: "在 Mapbox 網站設定 referer 限制"
  - name: "後端 URL 使用 HTTPS"
    check: "VITE_API_BASE_URL 以 'https://' 開頭"
  - name: "無私密資訊"
    check: "確認沒有資料庫密碼、API secret keys 等敏感資訊"

# 常見問題
faq:
  - q: "為什麼環境變數要在建置時注入？"
    a: "Vite 會在建置時將環境變數靜態替換到 JavaScript 程式碼中。執行時（Nginx 運行時）無法修改已編譯的 JS 檔案。"

  - q: "如何更新環境變數？"
    a: "需要重新建置映像檔。修改環境變數後執行 `npm run build`，然後重新部署 Cloud Run 服務。"

  - q: "Mapbox Token 暴露在前端安全嗎？"
    a: "安全，前提是使用 Public Token 並設定 URL referer 限制。Public Token 本來就設計為可公開使用。"

  - q: "能否在 Nginx 執行時動態注入環境變數？"
    a: "技術上可行（透過 entrypoint.sh 替換 HTML 中的佔位符），但增加複雜度且不符合 Vite 標準實踐，不建議。"
